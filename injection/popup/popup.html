<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYC Transit Scheduler</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <div>
        <h1>NYC Transit Scheduler</h1>
        <p class="subtitle">Route-aware commute blocks for Google Calendar</p>
      </div>
      <div class="theme-control">
        <span>Dark</span>
        <label class="switch theme-switch" title="Toggle dark mode" aria-label="Toggle dark mode">
          <input type="checkbox" id="theme-toggle" />
          <span></span>
        </label>
      </div>
    </header>

    <section class="settings-panel">
      <label class="field field-wide">
        <span class="label">Home Address</span>
        <input
          type="text"
          id="home-address"
          placeholder="350 5th Ave, New York, NY 10118"
          autocomplete="off"
          spellcheck="false"
        />
        <div id="address-suggestions" class="address-suggestions hidden"></div>
      </label>

      <div class="settings-grid">
        <label class="field">
          <span class="label">Default Mode</span>
          <select id="travel-mode">
            <option value="TRANSIT">Transit</option>
            <option value="WALK">Walking</option>
            <option value="DRIVE">Driving</option>
            <option value="BICYCLE">Biking</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Plan</span>
          <select id="planning-window">
            <option value="TODAY">Today</option>
            <option value="NEXT_24_HOURS">Next 24 hours</option>
            <option value="THIS_WEEK">This week</option>
          </select>
        </label>
      </div>

      <details class="preferences">
        <summary>Preferences</summary>
        <label class="check-row">
          <input type="checkbox" id="include-home-commutes" />
          <span>Add home-to-first and last-to-home blocks</span>
        </label>

        <label class="check-row">
          <input type="checkbox" id="use-separate-calendar" />
          <span>Use separate Transit Scheduler calendar</span>
        </label>

        <label class="check-row">
          <input type="checkbox" id="auto-refresh" />
          <span>Automatically refresh commute blocks hourly</span>
        </label>
      </details>
    </section>

    <div class="actions">
      <button id="preview-btn" class="btn btn-primary">Preview</button>
      <button id="refresh-btn" class="btn btn-secondary">Refresh Routes</button>
      <button id="add-btn" class="btn btn-success" disabled>Add to Calendar</button>
      <button id="remove-btn" class="btn btn-danger">Remove Commute Blocks</button>
    </div>

    <p id="status" class="status-text"></p>

    <section id="empty-state" class="empty-state">
      <h2>Ready to plan commutes</h2>
      <p>Preview upcoming events with locations, then add the routes you want to Calendar.</p>
      <span>Recent previews stay available for 30 minutes.</span>
    </section>

    <section id="results-section" class="results-section hidden">
      <div class="results-header">
        <h2>Commute Plan</h2>
        <span id="results-meta"></span>
      </div>
      <div id="results-list" class="results-list"></div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
